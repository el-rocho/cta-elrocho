name: Compilar y Publicar APK Android (Obtainium & Releases)

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar aplicación web (dist)
        run: npm run build

      - name: Sincronizar Capacitor con Android
        run: npx cap sync android

      - name: Configurar JDK 17 (Java)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Dar permisos de ejecución a Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Aceptar licencias Android SDK
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Compilar APK con Gradle
        run: |
          TAG="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.2.0' }}"
          VERSION="${TAG#v}"
          cd android
          ./gradlew assembleDebug -PappVersionName="$VERSION" --stacktrace --info

      - name: Preparar APK con nombre amigable
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/control-tension-arterial.apk

      - name: Subir APK como Artefacto de Workflow
        uses: actions/upload-artifact@v4
        with:
          name: control-tension-arterial-apk
          path: android/app/build/outputs/apk/debug/control-tension-arterial.apk
          retention-days: 14

      - name: Publicar APK en GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.2.0' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.2.0' }}
          body: |
            Release ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.2.0' }}
            - Nuevos ajustes de interfaz y legibilidad.
            - Correcciones en ruleta, notas, exportación y configuración.
          files: |
            android/app/build/outputs/apk/debug/control-tension-arterial.apk
          make_latest: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
