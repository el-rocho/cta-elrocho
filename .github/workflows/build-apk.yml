name: Compilar APK Debug de Android

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  build-apk:
    name: Compilar APK Android (Debug)
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar aplicación web (dist)
        run: npm run build

      - name: Sincronizar Capacitor con Android
        run: npx cap sync android

      - name: Configurar JDK 17 (Java)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Dar permisos de ejecución a Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Compilar APK Debug con Gradle
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Subir APK Debug como Artefacto de Workflow
        uses: actions/upload-artifact@v4
        with:
          name: control-tension-arterial-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
