name: Compilar y Publicar APK Android (Obtainium & Releases)

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar aplicación web (dist)
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v1.5.1"
          fi
          VITE_APP_VERSION="$TAG" npm run build

      - name: Sincronizar Capacitor con Android
        run: npx cap sync android

      - name: Configurar JDK 21 (Java)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Dar permisos de ejecución a Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Aceptar licencias Android SDK
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Compilar APK con Gradle
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v1.5.1"
          fi
          VERSION="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-1}
          MINOR=${MINOR:-3}
          PATCH=${PATCH:-1}
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "Compilando APK versión $VERSION (versionCode: $VERSION_CODE)..."
          cd android
          ./gradlew assembleDebug -PappVersionName="$VERSION" -PappVersionCode="$VERSION_CODE" --stacktrace

      - name: Preparar APK con nombre amigable
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/control-tension-arterial.apk

      - name: Subir APK como Artefacto de Workflow
        uses: actions/upload-artifact@v4
        with:
          name: control-tension-arterial-apk
          path: android/app/build/outputs/apk/debug/control-tension-arterial.apk
          retention-days: 14

      - name: Publicar APK en GitHub Releases (GitHub CLI)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v1.5.1"
          fi
          echo "Publicando release $TAG con GitHub CLI..."
          gh release create "$TAG" android/app/build/outputs/apk/debug/control-tension-arterial.apk --title "$TAG" --notes "Release $TAG - Control Tensión Arterial APK" --latest || gh release upload "$TAG" android/app/build/outputs/apk/debug/control-tension-arterial.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
