name: Compilar y Publicar APK Android (Obtainium & Releases)

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar aplicación web (dist)
        run: npm run build

      - name: Sincronizar Capacitor con Android
        run: npx cap sync android

      - name: Configurar JDK 17 (Java)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Dar permisos de ejecución a Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Aceptar licencias Android SDK
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Compilar APK con Gradle
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace --info

      - name: Subir APK como Artefacto de Workflow
        uses: actions/upload-artifact@v4
        with:
          name: control-tension-arterial-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Publicar APK en GitHub Releases (GitHub CLI)
        continue-on-error: true
        run: |
          TAG="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.2.0' }}"
          gh release create "$TAG" android/app/build/outputs/apk/debug/app-debug.apk#control-tension-arterial.apk --title "$TAG" --notes "Release $TAG" || gh release upload "$TAG" android/app/build/outputs/apk/debug/app-debug.apk#control-tension-arterial.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
